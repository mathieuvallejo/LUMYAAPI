services:
  mariadb:
    image: mariadb:latest
    container_name: lumya_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=lumya_secure_pass
      - MARIADB_DATABASE=lumya
      - MARIADB_USER=lumya_user
      - MARIADB_PASSWORD=lumya_secure_pass
    volumes:
      - lumya_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # ← À ajouter
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lumya_data: