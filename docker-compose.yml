services:
  mongodb:
    image: mongo:latest
    container_name: lumya_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=lumya_secure_pass
    volumes:
      - lumya_data:/data/db

volumes:
  lumya_data: